name: E2E Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      suite:
        description: 'Select test suite'
        required: true
        default: all
        type: choice
        options:
          - all
          - api
          - ui

jobs:
  api-tests:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.suite == 'all' || inputs.suite == 'api' }}
    runs-on: ubuntu-latest
    
    env:
      API_TOKEN: ${{ secrets.API_TOKEN }}
      APP_BASE_URL: ${{ vars.APP_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright test tests --project=api-tests --workers=1 --fail-on-flaky-tests

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 30

 
  ui-tests:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.suite == 'all' || inputs.suite == 'ui' }}
    runs-on: ubuntu-latest
    
    env:
      USER_EMAIL: ${{ secrets.USER_EMAIL }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      APP_BASE_URL: ${{ vars.APP_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium
      
      - run: npx playwright test tests --project=ui-tests --fail-on-flaky-tests

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-ui
          path: playwright-report/
          retention-days: 30