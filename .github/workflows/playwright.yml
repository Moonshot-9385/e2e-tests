name: Playwright Tests

# This defines what triggers the workflow (e.g., pushes or pull requests to main)
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      # Passage en v4 -> v4.2.2+ ou directement utiliser la v4 (v4 gère maintenant mieux les runners récents, mais passons à l'action setup-node révisée)
      - uses: actions/checkout@v4

      # Mise à jour de v4 à v5 pour supporter pleinement les nouveaux runners
      - uses: actions/setup-node@v5
        with:
          node-version: 20 # Vous pouvez laisser 20 ou passer à 22 (LTS) selon les besoins de votre projet
          cache: npm

      - run: npm ci

      # ÉTAPE À AJOUTER : Installe les navigateurs de la version 1.61.0
      - run: npx playwright install --with-deps chromium

      - run: npx playwright test tests/ --project=chromium

      # Mise à jour de v4 à v5 pour l'upload d'artéfacts
      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
