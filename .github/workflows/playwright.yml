name: Playwright Tests

# This defines what triggers the workflow (e.g., pushes or pull requests to main)
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      # ÉTAPE À AJOUTER : Installe les navigateurs de la version 1.61.0
      - run: npx playwright install --with-deps chromium

      - run: npx playwright test tests/ --project=chromium

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/ # Added the path so it knows what to upload
          retention-days: 30
