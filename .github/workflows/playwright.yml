name: Playwright Tests

on:
  push:
    branches: main
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium
      -  run: npx playwright test tests --project=api-tests --retries=1 --fail-on-flaky-tests

      - uses: actions/upload-artifact@v4
        if: always() # Le rapport sera quand même généré et téléchargeable pour analyser le fail
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
env :
URL_API: ${{secrets.URL_API}}
API_TOKEN: ${{secrets.API_TOKEN}}
USER_EMAIL: ${{secrets.EMAIL}}
USER_PASSWORD: ${{secrets.PASSWORD}}
URL_MOONSHOT: ${{secrets.MOONSHOT}}

