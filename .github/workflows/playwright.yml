name: Run Playwright Tests Manually
on:
  workflow_dispatch:

jobs:
  playwright-e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.44.0-jammy
    
    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Installation des dépendances
      run: npm ci

    - name: Exécution des tests Playwright
      # 1. On force l'utilisation exclusive de Chromium
      # 2. On indique le chemin spécifique de tes tests (ex: tests/)
      run: npx playwright test tests/ --project=chromium

    - name: Sauvegarde du rapport HTML
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
