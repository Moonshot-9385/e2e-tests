- name: Cache des navigateurs Playwright
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-chromium

    # Si Cache Miss : On installe le binaire Chromium et TOUTES ses dépendances système d'un coup
    - name: Installation complète de Chromium
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps chromium

    # Si Cache Hit : On installe UNIQUEMENT les dépendances système Linux manquantes (très rapide)
    - name: Installation des dépendances système uniquement
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chromium
