name: Playwright Tests

on:
  push:
    branches: main
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      # Exécute les tests. Si tu n'as pas configuré les 'retries' dans ton config file,
      # tu peux forcer 1 tentative de retry directement ici via la CLI (--retries=1)
      - run: npx playwright test tests --project=chromium --retries=1

      - uses: actions/upload-artifact@v4
        if: always() # Le rapport sera quand même généré et téléchargeable pour analyser le fail
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

