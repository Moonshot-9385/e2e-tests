name: Run Playwright Tests Manually
on:
  workflow_dispatch: # Permet le déclenchement manuel via l'interface GitHub

jobs:
  playwright-e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Installation des dépendances
      run: npm ci

    # Étape ajoutée : Récupération de la version exacte de Playwright pour la clé de cache
    - name: Obtenir la version de Playwright
      id: playwright-version
      run: echo "version=$(npm ls @playwright/test --json | jq -r '.dependencies["@playwright/test"].version')" >> $GITHUB_OUTPUT

    # Étape ajoutée : Mise en cache des binaires des navigateurs
    - name: Cache des navigateurs Playwright
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-chromium
        restore-keys: |
          ${{ runner.os }}-playwright-

    # Installation conditionnelle : Uniquement Chromium si le cache n'a pas été trouvé
    - name: Installation de Chromium Playwright
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium --with-deps

    # Si le cache est trouvé, on installe uniquement les dépendances système pour Chromium
    - name: Installation des dépendances système de Playwright
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chromium

    - name: Exécution des tests Playwright
      run: npx playwright test

    - name: Sauvegarde du rapport HTML
      uses: actions/upload-artifact@v4
      if: always() # Le rapport sera généré même si un test échoue
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
