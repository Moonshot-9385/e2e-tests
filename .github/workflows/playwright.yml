name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4 # Note: La v4 est actuellement la version stable recommandée avec cache
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/package-lock.json # Indique où se trouve le lock pour le cache

      - name: Install dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: tests
        run: npx playwright install --with-deps chromium

      # Option 1 : Pour lancer TOUT le dossier tests/
      - name: Run all E2E tests
        working-directory: tests
        run: npx playwright test tests/ --project=chromium

      # Option 2 (Alternative) : Si tu veux lancer un seul fichier, tu remplaces la ligne du dessus par :
      # run: npx playwright test tests/mon-fichier.spec.ts --project=chromium

      - uses: actions/upload-artifact@v4 # Note: v4 est la version stable actuelle pour les artifacts
        if: always()
        with:
          name: playwright-report
          path: tests/playwright-report/ # Ne pas oublier de cibler le bon dossier ici aussi
          retention-days: 30
