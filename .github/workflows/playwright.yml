name: Run Playwright Tests Manually
on:
  workflow_dispatch:

jobs:
  playwright-e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - name: Checkout du code
      uses: actions/checkout@v4

    - name: Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Installation des dépendances
      run: npm ci

    # Optimisé : Extraction ultra-rapide de la version via Node.js
    - name: Obtenir la version de Playwright
      id: playwright-version
      run: echo "version=$(node -p "require('./package.json').devDependencies['@playwright/test'] || require('./package.json').dependencies['@playwright/test']")" >> $GITHUB_OUTPUT

    - name: Cache des navigateurs Playwright
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}-chromium
        restore-keys: |
          ${{ runner.os }}-playwright-

    # Installation complète (binaire + deps) uniquement si Cache Miss
    - name: Installation de Chromium Playwright
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium --with-deps

    # Si Cache Hit : On ne télécharge PAS le binaire, on installe juste les dépendances système d'Ubuntu
    - name: Installation des dépendances système de Playwright
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps chromium

    - name: Exécution des tests Playwright
      run: npx playwright test

    - name: Sauvegarde du rapport HTML
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
