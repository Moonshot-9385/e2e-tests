name: Moonshot Test Release & E2E

on:
  push:
    branches:
      - main

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.get-url.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (Test Environment)
        id: get-url
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }} --cwd e2e-tests
          vercel build --token=${{ secrets.VERCEL_TOKEN }} --cwd e2e-tests
          # Récupération propre de l'URL de preview générée par Vercel
          DEPLOY_URL=$(vercel deploy --token=${{ secrets.VERCEL_TOKEN }} --cwd e2e-tests --confirm)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  run-e2e-tests:
    needs: deploy-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci
        working-directory: e2e-tests

      - name: Run E2E Tests
        run: npm run test
        working-directory: e2e-tests
        env:
          VERCEL_PREVIEW_URL: ${{ needs.deploy-test.outputs.preview_url }}