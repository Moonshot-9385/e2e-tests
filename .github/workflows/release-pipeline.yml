on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'playwright-report/**'
      - 'test-results/**'

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.get-url.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (Test Environment)
        id: get-url
        run: |
          # 1. Liaison du projet
          vercel link --yes --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }} --project=${{ secrets.VERCEL_PROJECT_ID }}
          
          # 2. Récupération des variables de preview
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

          # 3. Build local pour capturer proprement l'artefact
          vercel build --token=${{ secrets.VERCEL_TOKEN }}

          # 4. Déploiement de l'artefact pré-construit
          DEPLOY_URL=$(vercel deploy --prebuilt --yes --token=${{ secrets.VERCEL_TOKEN }})
          
          echo "Deployed URL: $DEPLOY_URL"
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  api-tests:
    runs-on: ubuntu-latest
    
    env:
      API_TOKEN: ${{ secrets.API_TOKEN }}
      APP_BASE_URL: ${{ vars.APP_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx playwright test tests --project=api-tests --workers=1 --retries=1 --reporter=list,html --trace on-first-retry --fail-on-flaky-tests


      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 30

  ui-tests:
    runs-on: ubuntu-latest
    
    env:
      USER_EMAIL: ${{ secrets.USER_EMAIL }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      APP_BASE_URL: ${{ vars.APP_BASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      
      - run: npx playwright test tests --project=ui-tests --workers=1 --retries=1 --timeout=12000 --reporter=list,html --trace on-first-retry --fail-on-flaky-tests

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-ui
          path: playwright-report/
          retention-days: 30