name: CI/CD Test Environment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
     
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

 
      - name: Install dependencies
        run: npm ci

      
      - name: Run Tests & Check Bugs
        run: |
          echo "Vérification des bugs en cours..."
          # Remplace cette ligne par ta vraie commande de test (ex: npx playwright test)
          npm test || echo "Tests terminés avec des observations"
          
          # Exemple : met à jour un fichier de rapport de test
          echo "Dernier test exécuté le : $(date)" > test-report.log

   
      - name: Commit changes to main
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          git add .
          
          # Vérifie s'il y a des changements avant de commiter pour éviter une erreur inutile
          git diff --staged --quiet || (git commit -m "chore: update test reports [skip ci]" && git push)
          
  deploy:
    needs: test-and-commit
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel Deploy Hook and start the build
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          HTTP_STATUS=$(echo "$RESPONSE" | tr '\n' ' ' | sed 's/.*HTTP_STATUS://')
          BODY=$(echo "$RESPONSE" | sed 's/HTTP_STATUS:[0-9]*//')
          
          echo "Réponse de Vercel : $BODY"
          echo "Code HTTP : $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" -ne 200 ] && [ "$HTTP_STATUS" -ne 201 ]; then
            echo "Erreur : Vercel a rejeté la requête."
            exit 1
          fi

  api-tests:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      
      - run: npx playwright test --project=api-tests --workers=1 --retries=1 --reporter=list,html
        env:
          APP_BASE_URL: https://test.moonshot-dashboard.com
          API_TOKEN: ${{ secrets.API_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 30

  ui-tests:
    needs: deploy 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      
      - run: npx playwright test --project=ui-tests --workers=2 --retries=1 --timeout=15000 --reporter=list,html
        env:
          APP_BASE_URL: https://test.moonshot-dashboard.com
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-ui
          path: playwright-report/
          retention-days: 30
