name: Moonshot Test Release & E2E

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'playwright-report/**'
      - 'test-results/**'

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    outputs:
      preview_url: ${{ steps.get-url.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (Test Environment)
        id: get-url
        working-directory: .
        run: |
          pwd
          ls -la
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

          DEPLOY_OUTPUT=$(vercel deploy --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL=$(printf '%s
' "$DEPLOY_OUTPUT" | grep -Eo 'https://[^[:space:]]+' | tail -n 1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed URL: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  run-e2e-tests:
    needs: deploy-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run E2E Tests
        run: npm run test
        env:
          APP_BASE_URL: ${{ needs.deploy-test.outputs.preview_url || vars.APP_BASE_URL }}
          VERCEL_PREVIEW_URL: ${{ needs.deploy-test.outputs.preview_url }}