name: CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'playwright-report/**'
      - 'test-results/**'

jobs:
  detect-bugs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run code quality & bug detection checks
        run: |
          echo "=== 1. Vérification des erreurs de types (TypeScript) ==="
          npx tsc --noEmit || echo "Pas de TypeScript ou ignoré"

          echo "=== 2. Analyse statique et Linter (ESLint) ==="
          npm run lint

          echo "=== 3. Audit de sécurité des packages ==="
          npm audit --audit-level=high

          echo "=== Tous les contrôles de bugs ont réussi ! ==="

  deploy-test:
    needs: detect-bugs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Test Environment (Vercel)
        run: |
          vercel link --yes --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }} --project=${{ secrets.VERCEL_PROJECT_ID }}
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
          
          echo "Deployed URL: https://moonshot-dashboard-test.vercel.app"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  api-tests:
    needs: deploy-test 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      
      - run: npx playwright test --project=api-tests --workers=1 --retries=1 --reporter=list,html
        env:
          APP_BASE_URL: https://moonshot-dashboard-test.vercel.app
          API_TOKEN: ${{ secrets.API_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 30

  ui-tests:
    needs: deploy-test 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      
      - run: npx playwright test --project=ui-tests --workers=1 --retries=1 --timeout=15000 --reporter=list,html
        env:
          APP_BASE_URL: https://moonshot-dashboard-test.vercel.app
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-ui
          path: playwright-report/
          retention-days: 30